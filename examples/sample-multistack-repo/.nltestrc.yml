# Example nltest configuration for a multi-stack automation repo.
# Place a file named .nltestrc.yml at the root of your test repo to customize
# how nltest scans and matches tests.

exclude_dirs:
  - fixtures
  - __snapshots__

# nltest has NO built-in dictionary of English synonyms -- differently-worded
# queries ("save" vs "persist", "import" vs "bulk upload a csv") are
# understood via semantic embeddings (see semantic_matching below), not a
# hardcoded word list. This `synonyms:` section is only for pinning
# deterministic, repo-specific aliases on top of that -- e.g. an internal
# codename or house terminology that even a semantic model wouldn't know to
# associate with the real feature name.
synonyms:
  checkout:
    - buy-now  # this team's internal name for the checkout flow

# Semantic (embedding-based) matching is on by default; it activates
# automatically if the optional `sentence-transformers` package is
# installed (`pip install nltest[semantic]`) and degrades gracefully to
# tag/name/fuzzy matching otherwise. Set to false to disable it outright.
semantic_matching: true

# Lower this to broaden matches (more recall, more false positives), or raise
# it to be stricter (fewer, more precise matches). Range: 0.0 - 1.0.
match_threshold: 0.35

# Cap on how many matched tests a single `nltest run` will execute.
max_matches: 200

# Manual escape hatch: force-include tests that automatic scanning/matching
# can't infer on its own (e.g. the feature is only referred to by an internal
# codename in the test, never the word a PM/QA would actually say).
feature_map:
  recording:
    - "tag:beacon_internal_codename"
